name: Build Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Archive Build
        run: |
          powershell Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows\AIMS2-Windows-Build.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIMS2-Windows-Executable
          path: build\windows\AIMS2-Windows-Build.zip
